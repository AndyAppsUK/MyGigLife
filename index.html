<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Your live music life, all in one place">
  <meta name="theme-color" content="#4a3f35">

  <!-- PWA Meta -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MyGigLife">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- Icons -->
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Patrick+Hand&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css?v=1.0.18">

  <title>MyGigLife</title>
</head>
<body>
  <!-- App Shell — populated by app.js -->
  <div id="app">
    <!-- Loading state -->
    <div style="
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f5f0e8;
      gap: 16px;
    ">
      <div style="
        font-family: 'Caveat', Georgia, serif;
        font-style: italic;
        font-size: 36px;
        font-weight: 700;
        color: #4a3f35;
        letter-spacing: 1px;
      ">MyGigLife</div>
      <div style="
        width: 32px;
        height: 32px;
        border: 3px solid #c9b99a;
        border-top-color: #4a3f35;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      "></div>
    </div>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </div>

  <!-- Database wrapper -->
  <script src="db.js?v=1.0.18"></script>
  <!-- Main application -->
  <script src="app.js?v=1.0.18"></script>
</body>
</html>
